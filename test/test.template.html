<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DateTime Component Test</title>
    <style>
        :root {
            --page-bg: #fff;
            --page-fg: #222;
            --page-muted: #666;
            --page-heading: #555;
            --page-border: #ccc;
            --example-bg: #f8f8f8;
            --code-bg: #eee;
            --button-bg: #fff;
            --button-fg: #222;
            --button-border: #bbb;
            --button-active-bg: #222;
            --button-active-fg: #fff;
            --button-active-border: #222;
        }

        body.theme-dark {
            --page-bg: #111418;
            --page-fg: #e7ebef;
            --page-muted: #aab4bf;
            --page-heading: #c7d0d8;
            --page-border: #39424c;
            --example-bg: #1a1f26;
            --code-bg: #232a33;
            --button-bg: #1a1f26;
            --button-fg: #e7ebef;
            --button-border: #4a5561;
            --button-active-bg: #e7ebef;
            --button-active-fg: #111418;
            --button-active-border: #e7ebef;
            --dt-tooltip-bg: #e7ebef;
            --dt-tooltip-fg: #111418;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 2em auto;
            padding: 0 1em 16vh;
            line-height: 1.6;
            color: var(--page-fg);
            background: var(--page-bg);
        }
        h2 { margin-top: 2em; border-bottom: 1px solid var(--page-border); padding-bottom: 0.3em; }
        h3 { margin-top: 1.5em; color: var(--page-heading); }
        .example { margin: 1em 0; padding: 1em; background: var(--example-bg); border-left: 3px solid var(--page-border); }
        .example p { margin: 0.3em 0; }
        code { background: var(--code-bg); padding: 0.1em 0.3em; font-size: 0.9em; border-radius: 2px; }
        .note { color: var(--page-muted); font-size: 0.9em; font-style: italic; }
        .controls {
            margin: 1.5em 0 1em;
            display: flex;
            gap: 0.75em;
            align-items: center;
            flex-wrap: wrap;
        }
        .view-toggle,
        .theme-toggle {
            display: flex;
            gap: 0.5em;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls-divider {
            width: 1px;
            align-self: stretch;
            background: var(--page-border);
        }
        .view-toggle button,
        .theme-toggle button {
            border: 1px solid var(--button-border);
            background: var(--button-bg);
            color: var(--button-fg);
            border-radius: 999px;
            padding: 0.45em 0.9em;
            cursor: pointer;
            font: inherit;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 2.25rem;
        }
        .view-toggle button[aria-pressed="true"],
        .theme-toggle button[aria-pressed="true"] {
            background: var(--button-active-bg);
            color: var(--button-active-fg);
            border-color: var(--button-active-border);
        }
        .test-view[hidden] { display: none; }

        /* BUILD:INLINE-DATETIME-CSS */
    </style>
</head>
<body>

<h1>DateTime Component</h1>
<p class="note">
    Your browser timezone: <strong id="tz-display"></strong><br>
    Hover over dashed-underlined times for tooltip. On mobile, tap.
</p>

<div class="controls">
    <div class="view-toggle" role="tablist" aria-label="Test page view mode">
        <button type="button" id="show-fallback" aria-pressed="true">Fallback Preview</button>
        <button type="button" id="show-interactive" aria-pressed="false">JS-Enabled Preview</button>
    </div>
    <div class="controls-divider" aria-hidden="true"></div>
    <div class="theme-toggle" aria-label="Theme mode">
        <button type="button" id="toggle-theme" aria-pressed="false">Dark Mode</button>
    </div>
</div>

<p class="note">Fallback Preview is visible by default so the page still shows useful output if JavaScript is disabled.</p>

<div id="test-view-fallback" class="test-view">
<!-- BUILD:TEST-CASES-FALLBACK -->
</div>

<div id="test-view-interactive" class="test-view" hidden>
<!-- BUILD:TEST-CASES-INTERACTIVE -->
</div>

<script>
/* BUILD:INLINE-DATETIME-JS */
</script>
<script>
    (function () {
        var body = document.body;
        var fallbackButton = document.getElementById('show-fallback');
        var interactiveButton = document.getElementById('show-interactive');
        var fallbackView = document.getElementById('test-view-fallback');
        var interactiveView = document.getElementById('test-view-interactive');
        var themeButton = document.getElementById('toggle-theme');

        function showView(mode) {
            var showingFallback = mode === 'fallback';
            fallbackView.hidden = !showingFallback;
            interactiveView.hidden = showingFallback;
            fallbackButton.setAttribute('aria-pressed', showingFallback ? 'true' : 'false');
            interactiveButton.setAttribute('aria-pressed', showingFallback ? 'false' : 'true');
        }

        function setTheme(theme) {
            var isDark = theme === 'dark';
            body.classList.toggle('theme-dark', isDark);
            themeButton.setAttribute('aria-pressed', isDark ? 'true' : 'false');
            themeButton.textContent = isDark ? 'Light Mode' : 'Dark Mode';
        }

        fallbackButton.addEventListener('click', function () { showView('fallback'); });
        interactiveButton.addEventListener('click', function () { showView('interactive'); });
        themeButton.addEventListener('click', function () {
            setTheme(body.classList.contains('theme-dark') ? 'light' : 'dark');
        });

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            setTheme('dark');
        }
    })();

    document.getElementById('tz-display').textContent = (function() {
        var d = new Date();
        var off = -d.getTimezoneOffset();
        var sign = off >= 0 ? '+' : '-';
        var abs = Math.abs(off);
        var h = Math.floor(abs / 60);
        var m = abs % 60;
        try {
            var parts = new Intl.DateTimeFormat('en-US', { timeZoneName: 'long' })
                .formatToParts(d);
            for (var i = 0; i < parts.length; i++) {
                if (parts[i].type === 'timeZoneName') {
                    return parts[i].value + ' (UTC' + sign + h + (m ? ':' + (m < 10 ? '0' : '') + m : '') + ')';
                }
            }
        } catch (e) {}
        return 'UTC' + sign + h;
    })();
</script>
</body>
</html>
